services:
  db:
    image: postgres:15-alpine
    container_name: foodshot_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foodshot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodshot_pass}
      POSTGRES_DB: ${POSTGRES_DB:-foodshot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: foodshot_redis
    restart: always
    ports:
      - "6379:6379"

  bot:
    build: .
    container_name: foodshot_bot
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-foodshot}:${POSTGRES_PASSWORD:-foodshot_pass}@db:5432/${POSTGRES_DB:-foodshot}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
